name = "hex-determinant-conformance"
defaultTargets = ["HexDeterminantConformance", "hexdeterminant_emit_fixtures"]

[[require]]
name = "HexDeterminant"
path = ".."

[[require]]
name = "hex-test-kit"
git = "https://github.com/leanprover/hex-test-kit.git"
rev = "610207eec0ca214928eec42a6dd2084d859bf94d"

[[lean_lib]]
name = "HexDeterminantConformance"
globs = ["HexDeterminant.Conformance"]

[[lean_exe]]
name = "hexdeterminant_emit_fixtures"
root = "HexDeterminant.EmitFixtures"
